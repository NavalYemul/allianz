# This is a Databricks asset bundle definition for allianz_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: allianz_project
  uuid: 22f938da-30e8-4a7d-bafc-cc3de942b360

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-921bc807-9d50.cloud.databricks.com/
    variables:
      catalog: dev

  uat:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: testing
    workspace:
      host: https://dbc-921bc807-9d50.cloud.databricks.com/
    variables:
      catalog: uat
      
  prod:
    mode: production
    workspace:
      host: https://dbc-921bc807-9d50.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/tlyemul@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/tlyemul@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: prod
    permissions:
      - user_name: tlyemul@gmail.com
        level: CAN_MANAGE
